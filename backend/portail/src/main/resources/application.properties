spring.application.name=portail

server.port=${PORT:8082}

# ── MySQL (actif) ──────────────────────────────────────────────────────────────
spring.datasource.url=${DATABASE_URL:jdbc:mysql://localhost:3306/uca_portail?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.username=${DATABASE_USERNAME:root}
spring.datasource.password=${DATABASE_PASSWORD:}

# ── H2 (désactivé) ────────────────────────────────────────────────────────────
# spring.datasource.url=jdbc:h2:mem:ucadb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
# spring.datasource.driver-class-name=org.h2.Driver
# spring.datasource.username=sa
# spring.datasource.password=
# spring.h2.console.enabled=true
# spring.h2.console.path=/h2-console

# ── JPA / Hibernate ────────────────────────────────────────────────────────────
# update = garde les données entre redémarrages (ne recrée pas les tables)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ── JWT ────────────────────────────────────────────────────────────────────────
app.jwt.secret=${JWT_SECRET:dW5lQ2xlU2VjcmV0ZVRyZXNMb25ndWVQb3VyVUNBUG9ydGFpbDIwMjQ=}
app.jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}

# ── CORS ───────────────────────────────────────────────────────────────────────
app.cors.allowed-origins=https://zzidani4800.github.io,http://localhost:3000

# ── Données d'initialisation (DataLoader) ─────────────────────────────────────
app.init.admin-email=${ADMIN_EMAIL:admin@gmail.com}
app.init.admin-password=${ADMIN_PASSWORD:Admin123}

# ── Email (Gmail avec App Password) ────────────────────────────────────────────
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:465}
spring.mail.username=${MAIL_USERNAME:default@test.com}
spring.mail.password=${MAIL_PASSWORD:fake_password}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.ssl.enable=true
spring.mail.properties.mail.smtp.starttls.enable=false
spring.mail.properties.mail.smtp.starttls.required=false
spring.mail.default-encoding=UTF-8
app.mail.from=${MAIL_FROM:noreply@test.com}