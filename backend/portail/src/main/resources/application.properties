spring.application.name=portail

server.port=8082

# ── MySQL (actif) ──────────────────────────────────────────────────────────────
spring.datasource.url=jdbc:mysql://localhost:3306/uca_portail?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.username=root
spring.datasource.password=

# ── H2 (désactivé) ────────────────────────────────────────────────────────────
# spring.datasource.url=jdbc:h2:mem:ucadb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
# spring.datasource.driver-class-name=org.h2.Driver
# spring.datasource.username=sa
# spring.datasource.password=
# spring.h2.console.enabled=true
# spring.h2.console.path=/h2-console

# ── JPA / Hibernate ────────────────────────────────────────────────────────────
# update = garde les données entre redémarrages (ne recrée pas les tables)
spring.jpa.hibernate.ddl-auto=create
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ── JWT ────────────────────────────────────────────────────────────────────────
app.jwt.secret=dW5lQ2xlU2VjcmV0ZVRyZXNMb25ndWVQb3VyVUNBUG9ydGFpbDIwMjQ=
app.jwt.expiration-ms=86400000

# ── CORS ───────────────────────────────────────────────────────────────────────
app.cors.allowed-origins=http://localhost:3000

# ── Données d'initialisation (DataLoader) ─────────────────────────────────────
app.init.admin-email=admin@gmail.com
app.init.admin-password=Admin123